services:
  - type: web
    name: cerberus-hellion
    runtime: python
    plan: starter
    region: ohio
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python src/render_app.py
    healthCheckPath: /healthz
    maxShutdownDelaySeconds: 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: PORT
        value: 10000
      - key: CERBERUS_MEMORY_DIR
        value: /var/data/.cerberus
      - key: CERBERUS_MEMORY_BACKEND
        value: mongo
      - key: MONGODB_DATABASE
        value: cerberus
      - key: CERBERUS_MONGO_COLLECTION_PREFIX
        value: hellion
      - key: MONGODB_URI
        sync: false
      - key: CLAW_ROYALE_LIVE_FEED_URL
        value: https://www.clawroyale.ai/games
      - key: CLAW_ROYALE_SPECTATE_BASE_URL
        value: https://www.clawroyale.ai/games/spect
      - key: CLAW_ROYALE_VERSION
        value: 1.13.1
      - key: CLAW_ROYALE_RUNTIME_ENABLED
        value: "true"
      - key: CLAW_ROYALE_GAME_MODE
        value: offchain
      - key: CLAW_ROYALE_FREE_FALLBACK_ENABLED
        value: "true"
      - key: CLAW_ROYALE_AVOID_EMPTY_PAID_ROOMS
        value: "true"
      - key: CERBERUS_MOLTYBOOK_ENABLED
        value: "false"
      - key: MOLTSTATION_RUNTIME_ENABLED
        value: "true"
      - key: MOLTSTATION_GAME_SLUG
        value: shellrunners
      - key: MOLTSTATION_SHELLRUNNERS_CONTRACT
        sync: false
      - key: MOLTSTATION_API_KEY
        sync: false
      - key: MOLTSTATION_AGENT_WALLET
        sync: false
      - key: MOLTSTATION_AGENT_PRIVATE_KEY
        sync: false
      - key: CERBERUS_HTTP_TOKEN
        generateValue: true
      - key: CERBERUS_PIN
        sync: false
      - key: AGENTMAIL_API_KEY
        sync: false
      - key: AGENTMAIL_INBOX_ID
        sync: false
      - key: AGENTMAIL_EMAIL
        sync: false
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: X_REDIRECT_URI
        sync: false
      - key: CLAW_ROYALE_API_KEY
        sync: false
      - key: CLAW_ROYALE_ERC8004_ID
        sync: false
      - key: CERBERUS_AGENT_EOA_PRIVATE_KEY
        sync: false
      - key: CERBERUS_OWNER_EOA_PRIVATE_KEY
        sync: false
      - key: MOLTBOOK_API_KEY
        sync: false
    disk:
      name: cerberus-data
      mountPath: /var/data/.cerberus
      sizeGB: 5
